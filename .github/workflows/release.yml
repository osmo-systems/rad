name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux audio deps
        if: matrix.os == 'ubuntu-latest' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev pkg-config

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARCHIVE="rad-${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" \
            -C target/${{ matrix.target }}/release \
            rad
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Checkout homebrew-tools tap
        uses: actions/checkout@v4
        with:
          repository: osmo-systems/homebrew-tools
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tools

      - name: Update formula
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          FORMULA=homebrew-tools/Formula/rad.rb

          sha() {
            sha256sum "artifacts/rad-${VERSION}-${1}.tar.gz" | awk '{print $1}'
          }

          SHA_AARCH64_DARWIN=$(sha aarch64-apple-darwin)
          SHA_X86_64_DARWIN=$(sha x86_64-apple-darwin)
          SHA_AARCH64_LINUX=$(sha aarch64-unknown-linux-gnu)
          SHA_X86_64_LINUX=$(sha x86_64-unknown-linux-gnu)

          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" "$FORMULA"

          perl -i -0pe "
            s|(aarch64-apple-darwin[^\n]*\n\s*sha256 \")[0-9a-f]{64}|\${1}${SHA_AARCH64_DARWIN}|g;
            s|(x86_64-apple-darwin[^\n]*\n\s*sha256 \")[0-9a-f]{64}|\${1}${SHA_X86_64_DARWIN}|g;
            s|(aarch64-unknown-linux-gnu[^\n]*\n\s*sha256 \")[0-9a-f]{64}|\${1}${SHA_AARCH64_LINUX}|g;
            s|(x86_64-unknown-linux-gnu[^\n]*\n\s*sha256 \")[0-9a-f]{64}|\${1}${SHA_X86_64_LINUX}|g;
          " "$FORMULA"

      - name: Commit updated formula
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd homebrew-tools
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rad.rb
          git diff --cached --quiet || git commit -m "chore: update rad formula for v${VERSION} [skip ci]"
          git push origin HEAD:main

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
